<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="訓練紀錄">
<title>訓練紀錄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF8F5;--coral:#E05A3A;--coral-l:#FAEAE5;--coral-m:#F5C4B3;
  --muted:#9E8E85;--card:#FFF;--border:rgba(92,64,51,0.1);--text:#2C1F1A;--green:#2D7D4F
}
html,body{height:100%;background:#F0EDE8}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;display:flex;justify-content:center;align-items:flex-start}
#app{width:100%;max-width:430px;min-height:100dvh;background:var(--cream);display:flex;flex-direction:column;position:relative}
.screen{display:none;flex-direction:column;flex:1;min-height:100dvh}.screen.active{display:flex}
.scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.tabs{display:flex;padding:10px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));gap:6px;border-top:.5px solid var(--border);background:var(--cream)}
.tab{flex:1;padding:9px 0;border:none;background:transparent;font-size:12px;color:var(--muted);cursor:pointer;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab.on{background:var(--coral-l);color:var(--coral)}.ti{font-size:17px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:max(20px,env(safe-area-inset-top)) 20px 10px}
.nav h2{font-size:18px;font-weight:500;color:var(--text)}.nav-back{font-size:14px;color:var(--coral);cursor:pointer}
.cal-header{padding:max(28px,calc(env(safe-area-inset-top)+12px)) 20px 8px}
.cal-header h1{font-size:26px;font-weight:500;color:var(--text)}
.cal-sub{font-size:13px;color:var(--muted);margin-top:4px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
.cal-month{font-size:16px;font-weight:500;color:var(--text)}
.cal-arrow{background:none;border:.5px solid var(--border);border-radius:10px;width:32px;height:32px;cursor:pointer;color:var(--coral);font-size:16px}
.cal-grid{padding:0 16px 20px;display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px;color:var(--text);cursor:pointer;position:relative;transition:background .15s}
.cal-day:active{background:var(--coral-l)}.cal-day.other{color:rgba(158,142,133,0.4);pointer-events:none}
.cal-day.today{font-weight:500;color:var(--coral)}.cal-day.today::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--coral);position:absolute;bottom:3px}
.cal-day.checked{background:var(--coral);color:#fff}
.cal-day.checked.today::after{background:rgba(255,255,255,0.7)}
.cal-hint{text-align:center;font-size:13px;color:var(--muted);padding:0 20px 16px}
.workout-date-banner{margin:0 20px 14px;background:var(--coral-l);border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.workout-date-text{font-size:14px;font-weight:500;color:var(--coral)}.workout-date-sub{font-size:12px;color:var(--coral-m)}
.muscle-row{display:flex;gap:8px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none}.muscle-row::-webkit-scrollbar{display:none}
.mchip{padding:7px 15px;border-radius:20px;border:.5px solid var(--border);background:var(--card);font-size:14px;color:var(--text);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent}
.mchip.on{background:var(--coral);color:#fff;border-color:var(--coral)}.mchip .edit-m{font-size:11px;opacity:.6}
.ex-section{padding:0 20px 12px}
.ex-sec-title{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.add-small{font-size:12px;color:var(--coral);background:none;border:none;cursor:pointer}
.ex-chips{display:flex;flex-wrap:wrap;gap:8px}
.echip{padding:7px 13px;border-radius:20px;border:.5px solid var(--border);background:var(--card);font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent}
.echip .eplus{width:17px;height:17px;background:var(--coral);border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.echip .edel{width:17px;height:17px;background:#fee;border-radius:50%;color:var(--coral);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;cursor:pointer}
.rec-label{padding:14px 20px 8px;font-size:13px;color:var(--muted)}
.excard{background:var(--card);border-radius:16px;padding:13px 15px;margin:0 20px 10px;border:.5px solid var(--border)}
.excard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.excard-name{font-size:15px;font-weight:500;color:var(--text)}
.del-btn{width:26px;height:26px;border:none;background:#fee;border-radius:8px;color:var(--coral);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.set-cols{display:grid;grid-template-columns:18px 1fr 1fr 26px;gap:4px;margin-bottom:4px}
.set-col-lbl{font-size:11px;color:var(--muted);text-align:center}
.set-row{display:grid;grid-template-columns:18px 1fr 1fr 26px;gap:4px;align-items:center;padding:5px 0;border-top:.5px solid var(--border)}
.snum{font-size:13px;color:var(--muted)}
.nctrl{display:flex;align-items:center;gap:4px}
.nbtn{width:32px;height:32px;border:.5px solid var(--border);background:var(--cream);border-radius:7px;font-size:16px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.nval{flex:1;text-align:center;font-size:14px;font-weight:500;color:var(--text);background:var(--cream);border:.5px solid var(--border);border-radius:7px;padding:6px 2px;min-width:0}
.tbtn{width:32px;height:32px;background:var(--coral-l);border:none;border-radius:7px;color:var(--coral);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.set-actions{display:flex;justify-content:space-between;margin-top:6px}
.sa-btn{font-size:12px;color:var(--coral);background:none;border:none;cursor:pointer;padding:6px 0}
.empty-hint{text-align:center;color:var(--muted);font-size:14px;padding:20px 0}
.btm-actions{padding:12px 20px 20px;display:flex;gap:10px}
.cancel-btn{flex:1;padding:14px;border:.5px solid var(--border);background:var(--card);border-radius:14px;font-size:14px;color:var(--muted);cursor:pointer}
.finish-btn{flex:2;padding:14px;background:var(--coral);border:none;border-radius:14px;font-size:14px;font-weight:500;color:#fff;cursor:pointer}
.timer-screen{background:var(--cream);align-items:center;justify-content:center;gap:22px;padding:40px 20px}
.timer-title{font-size:15px;color:var(--muted)}.timer-big{font-size:72px;font-weight:500;color:var(--text);letter-spacing:-2px}
.tbar-wrap{width:100%;height:4px;background:var(--border);border-radius:2px}.tbar{height:4px;background:var(--coral);border-radius:2px;transition:width 1s linear}
.tadj{display:flex;gap:10px;width:100%}.tadj-btn{flex:1;padding:13px;border:.5px solid var(--border);background:var(--card);border-radius:12px;font-size:15px;color:var(--text);cursor:pointer}
.tctrls{display:flex;gap:10px;width:100%}
.tpause{flex:1;padding:16px;background:var(--coral);border:none;border-radius:14px;font-size:15px;font-weight:500;color:#fff;cursor:pointer}
.treset{flex:1;padding:16px;background:var(--card);border:.5px solid var(--border);border-radius:14px;font-size:15px;color:var(--text);cursor:pointer}
.tclose{font-size:14px;color:var(--coral);cursor:pointer;padding:8px}
.pr-header{padding:max(28px,calc(env(safe-area-inset-top)+12px)) 20px 8px}
.pr-header h1{font-size:26px;font-weight:500;color:var(--text)}
.filter-row{display:flex;gap:8px;padding:10px 20px;overflow-x:auto;scrollbar-width:none}.filter-row::-webkit-scrollbar{display:none}
.fchip{padding:7px 16px;border-radius:20px;border:.5px solid var(--border);background:var(--card);font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fchip.on{background:var(--coral-l);color:var(--coral);border-color:var(--coral-m)}
.chart-card{margin:8px 20px;background:var(--card);border-radius:16px;padding:14px;border:.5px solid var(--border)}
.chart-card-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px}
.pr-cards{padding:0 20px;display:flex;flex-direction:column;gap:10px;padding-bottom:20px}
.prcard{background:var(--card);border-radius:14px;padding:13px 15px;border:.5px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent}
.prcard.selected{border-color:var(--coral);background:var(--coral-l)}
.prcard-left .prname{font-size:15px;font-weight:500;color:var(--text)}.prcard-left .prdate{font-size:12px;color:var(--muted);margin-top:2px}
.prcard-left .prtrend{font-size:12px;color:var(--green);margin-top:2px}
.prcard-right .prval{font-size:22px;font-weight:500;color:var(--coral)}.prcard-right .prlabel{font-size:11px;color:var(--muted);text-align:right}
.settings-header{padding:max(28px,calc(env(safe-area-inset-top)+12px)) 20px 8px}
.settings-header h1{font-size:26px;font-weight:500;color:var(--text)}
.settings-section{padding:16px 20px 0}
.settings-label{font-size:13px;color:var(--muted);margin-bottom:10px}
.settings-card{background:var(--card);border-radius:16px;border:.5px solid var(--border);overflow:hidden;margin-bottom:16px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:.5px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.settings-row:last-child{border-bottom:none}
.settings-row-left{display:flex;align-items:center;gap:12px}
.settings-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.settings-row-title{font-size:15px;color:var(--text)}.settings-row-sub{font-size:12px;color:var(--muted);margin-top:2px}
.settings-arrow{font-size:16px;color:var(--muted)}
.backup-status{margin:12px 20px 0;background:var(--coral-l);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--coral);display:none}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,31,26,0.5);display:flex;align-items:flex-end;z-index:100}
.modal{background:var(--cream);border-radius:24px 24px 0 0;padding:20px;padding-bottom:max(24px,env(safe-area-inset-bottom));width:100%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:500;color:var(--text);margin-bottom:16px}
.modal-input{width:100%;padding:13px 14px;border:.5px solid var(--border);border-radius:12px;font-size:16px;background:var(--card);color:var(--text);outline:none;margin-bottom:10px;-webkit-appearance:none}
.modal-btns{display:flex;gap:8px;margin-top:6px}
.m-cancel{flex:1;padding:14px;border:.5px solid var(--border);background:var(--card);border-radius:12px;font-size:14px;color:var(--muted);cursor:pointer}
.m-ok{flex:2;padding:14px;background:var(--coral);border:none;border-radius:12px;font-size:14px;font-weight:500;color:#fff;cursor:pointer}
.modal-list{max-height:200px;overflow-y:auto;margin-bottom:10px}
.modal-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:.5px solid var(--border)}
.modal-item-name{font-size:14px;color:var(--text)}.modal-item-del{font-size:13px;color:var(--coral);background:none;border:none;cursor:pointer;padding:4px 8px}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="cal-header">
    <h1>訓練日曆</h1>
    <div class="cal-sub">點選日期開始記錄訓練</div>
  </div>
  <div class="cal-nav">
    <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
    <span class="cal-month" id="cal-month-label"></span>
    <button class="cal-arrow" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-hint">點選任何日期 — 新增或補記訓練</div>
  <div style="flex:1"></div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('s-home',this)"><span class="ti">📅</span>日曆</button>
    <button class="tab" onclick="goTab('s-pr',this)"><span class="ti">📈</span>趨勢</button>
    <button class="tab" onclick="goTab('s-settings',this)"><span class="ti">⚙️</span>設定</button>
  </div>
</div>

<!-- WORKOUT -->
<div id="s-workout" class="screen">
  <div class="nav">
    <span class="nav-back" onclick="go('s-home')">← 返回</span>
    <h2>訓練記錄</h2>
    <span style="width:40px"></span>
  </div>
  <div class="workout-date-banner">
    <div>
      <div class="workout-date-text" id="workout-date-text"></div>
      <div class="workout-date-sub" id="workout-date-sub"></div>
    </div>
    <span style="font-size:20px">📝</span>
  </div>
  <div class="muscle-row" id="muscle-row"></div>
  <div class="scroll">
    <div id="ex-lists"></div>
    <div class="rec-label">已記錄動作：</div>
    <div id="rec-cards"></div>
    <div id="ex-empty" class="empty-hint">點擊上方動作加入訓練</div>
    <div style="height:20px"></div>
  </div>
  <div class="btm-actions">
    <button class="cancel-btn" onclick="go('s-home')">取消</button>
    <button class="finish-btn" onclick="finishWorkout()">✓ 儲存記錄</button>
  </div>
</div>

<!-- TIMER -->
<div id="s-timer" class="screen timer-screen">
  <div class="timer-title">組間休息</div>
  <div class="timer-big" id="t-disp">02:00</div>
  <div class="tbar-wrap" style="width:100%"><div class="tbar" id="t-bar" style="width:100%"></div></div>
  <div class="tadj">
    <button class="tadj-btn" onclick="adjT(-10)">-10s</button>
    <button class="tadj-btn" onclick="adjT(10)">+10s</button>
  </div>
  <div class="tctrls">
    <button class="tpause" id="t-pause" onclick="toggleT()">⏸ 暫停</button>
    <button class="treset" onclick="resetT()">↺ 重新計時</button>
  </div>
  <span class="tclose" onclick="go('s-workout')">× 關閉</span>
</div>

<!-- PR -->
<div id="s-pr" class="screen">
  <div class="pr-header"><h1>進步趨勢</h1></div>
  <div class="filter-row" id="pr-filters"></div>
  <div class="chart-card" id="pr-chart-card" style="display:none">
    <div class="chart-card-title" id="pr-chart-title"></div>
    <canvas id="prChart" height="150"></canvas>
  </div>
  <div style="padding:10px 20px 6px;font-size:13px;color:var(--muted)">點選動作查看趨勢</div>
  <div class="scroll"><div class="pr-cards" id="pr-cards"></div></div>
  <div class="tabs">
    <button class="tab" onclick="goTab('s-home',this)"><span class="ti">📅</span>日曆</button>
    <button class="tab on" onclick="goTab('s-pr',this)"><span class="ti">📈</span>趨勢</button>
    <button class="tab" onclick="goTab('s-settings',this)"><span class="ti">⚙️</span>設定</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="s-settings" class="screen">
  <div class="settings-header"><h1>設定</h1></div>
  <div class="backup-status" id="backup-status"></div>
  <div class="scroll">
    <div class="settings-section">
      <div class="settings-label">資料備份</div>
      <div class="settings-card">
        <div class="settings-row" onclick="exportData()">
          <div class="settings-row-left">
            <div class="settings-icon" style="background:#E6F4ED">💾</div>
            <div><div class="settings-row-title">匯出備份</div><div class="settings-row-sub">下載 JSON 檔案到手機</div></div>
          </div>
          <span class="settings-arrow">›</span>
        </div>
        <div class="settings-row" onclick="document.getElementById('import-input').click()">
          <div class="settings-row-left">
            <div class="settings-icon" style="background:#FAEAE5">📂</div>
            <div><div class="settings-row-title">匯入備份</div><div class="settings-row-sub">從 JSON 檔案還原資料</div></div>
          </div>
          <span class="settings-arrow">›</span>
        </div>
      </div>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="settings-section">
      <div class="settings-label">資料狀態</div>
      <div class="settings-card">
        <div class="settings-row" style="cursor:default">
          <div class="settings-row-left">
            <div class="settings-icon" style="background:#F1EFE8">📊</div>
            <div><div class="settings-row-title">訓練紀錄</div><div class="settings-row-sub" id="stats-logs">載入中...</div></div>
          </div>
        </div>
        <div class="settings-row" style="cursor:default">
          <div class="settings-row-left">
            <div class="settings-icon" style="background:#F1EFE8">🏋️</div>
            <div><div class="settings-row-title">動作資料庫</div><div class="settings-row-sub" id="stats-db">載入中...</div></div>
          </div>
        </div>
        <div class="settings-row" style="cursor:default">
          <div class="settings-row-left">
            <div class="settings-icon" style="background:#F1EFE8">🕐</div>
            <div><div class="settings-row-title">上次備份</div><div class="settings-row-sub" id="stats-backup">從未備份</div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">危險操作</div>
      <div class="settings-card">
        <div class="settings-row" onclick="clearAllData()">
          <div class="settings-row-left">
            <div class="settings-icon" style="background:#FCE8E8">🗑️</div>
            <div><div class="settings-row-title" style="color:var(--coral)">清除所有資料</div><div class="settings-row-sub">刪除全部訓練紀錄</div></div>
          </div>
          <span class="settings-arrow">›</span>
        </div>
      </div>
    </div>
    <div style="height:20px"></div>
  </div>
  <div class="tabs">
    <button class="tab" onclick="goTab('s-home',this)"><span class="ti">📅</span>日曆</button>
    <button class="tab" onclick="goTab('s-pr',this)"><span class="ti">📈</span>趨勢</button>
    <button class="tab on" onclick="goTab('s-settings',this)"><span class="ti">⚙️</span>設定</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const DEFAULT_DB={
  '胸部':{'自由重量':['槓鈴臥推','啞鈴臥推','上斜臥推','下斜臥推'],'器械':['蝴蝶機夾胸','機械臥推','上斜機械']},
  '背部':{'自由重量':['硬舉','槓鈴划船','啞鈴划船'],'器械':['滑輪下拉','坐姿划船']},
  '臀腿':{'自由重量':['槓鈴深蹲','保加利亞分腿蹲','相撲硬舉'],'器械':['哈克深蹲','腿推機','腿彎舉']},
  '肩部':{'自由重量':['槓鈴肩推','啞鈴肩推','側平舉'],'器械':['機械肩推','繩索側平舉']},
  '手臂':{'自由重量':['槓鈴彎舉','啞鈴彎舉','頸後臂屈伸'],'器械':['繩索彎舉','繩索下壓']}
};
function loadDB(){try{return JSON.parse(localStorage.getItem('wt_db'))||JSON.parse(JSON.stringify(DEFAULT_DB))}catch(e){return JSON.parse(JSON.stringify(DEFAULT_DB))}}
function saveDB(d){try{localStorage.setItem('wt_db',JSON.stringify(d))}catch(e){}}
function loadLogs(){try{return JSON.parse(localStorage.getItem('wt_logs'))||[]}catch(e){return[]}}
function saveLogs(d){try{localStorage.setItem('wt_logs',JSON.stringify(d))}catch(e){}}

let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let workoutDate='',curMuscle='',session={};
let tSec=120,tMax=120,tRunning=false,tInt=null;
let selectedEx=null,prChartInst=null,prFilter='全部';

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-home')renderCal();
  if(id==='s-pr')renderPR();
  if(id==='s-settings')renderSettings();
}
function goTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  // sync same tab in other screens
  go(id);
}

function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCal()}
function fmtDate(d){return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`}

function renderCal(){
  const logs=loadLogs(),checked=new Set(logs.map(l=>l.date));
  const now=new Date(),today=fmtDate(now);
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month-label').textContent=`${calYear} 年 ${mn[calMonth]}`;
  const first=new Date(calYear,calMonth,1).getDay(),days=new Date(calYear,calMonth+1,0).getDate();
  let html=['日','一','二','三','四','五','六'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++)html+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calYear}/${calMonth+1}/${d}`;
    html+=`<div class="cal-day ${ds===today?'today':''} ${checked.has(ds)?'checked':''}" onclick="openDay('${ds}')">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function openDay(ds){
  const logs=loadLogs(),existing=logs.find(l=>l.date===ds);
  const today=fmtDate(new Date()),label=ds===today?'今天':ds;
  showModal(`${label} 的訓練`,`
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:12px">
      <button class="m-ok" style="flex:none" onclick="closeModal();startWorkoutOn('${ds}')">
        ${existing&&existing.exercises&&existing.exercises.length?'✏ 編輯訓練記錄':'＋ 記錄訓練'}
      </button>
      ${existing?`<button class="m-cancel" style="flex:none;color:var(--coral);border-color:var(--coral-m)" onclick="closeModal();deleteDay('${ds}')">🗑 刪除此日紀錄</button>`:''}
    </div>
    <button class="m-cancel" style="width:100%" onclick="closeModal()">取消</button>`);
}
function deleteDay(ds){saveLogs(loadLogs().filter(l=>l.date!==ds));renderCal()}

function startWorkoutOn(ds){
  workoutDate=ds;
  const existing=loadLogs().find(l=>l.date===ds);
  session={};
  if(existing&&existing.exercises)existing.exercises.forEach(e=>{session[e.name]=e.sets.map(s=>({...s}))});
  curMuscle=Object.keys(loadDB())[0]||'胸部';
  const wday=['日','一','二','三','四','五','六'];
  const p=ds.split('/'),d=new Date(p[0],p[1]-1,p[2]);
  document.getElementById('workout-date-text').textContent=ds===fmtDate(new Date())?`今天 · ${ds}`:`補記 · ${ds}`;
  document.getElementById('workout-date-sub').textContent=`星期${wday[d.getDay()]}`;
  renderMuscleTabs();renderExLists();renderRecCards();go('s-workout');
}

function renderMuscleTabs(){
  const db=loadDB();
  document.getElementById('muscle-row').innerHTML=Object.keys(db).map(m=>
    `<div class="mchip ${m===curMuscle?'on':''}" onclick="selMuscle('${m}')">
      ${m}<span class="edit-m" onclick="event.stopPropagation();editMuscle('${m}')">✏</span>
    </div>`).join('')+`<div class="mchip" onclick="addMuscle()" style="color:var(--coral)">＋</div>`;
}
function selMuscle(m){curMuscle=m;renderMuscleTabs();renderExLists()}
function renderExLists(){
  const db=loadDB(),cats=db[curMuscle]||{};
  document.getElementById('ex-lists').innerHTML=Object.entries(cats).map(([cat,exs])=>`
    <div class="ex-section">
      <div class="ex-sec-title"><span>${cat}</span><button class="add-small" onclick="addExercise('${curMuscle}','${cat}')">＋ 新增動作</button></div>
      <div class="ex-chips">${exs.map(e=>`<div class="echip"><span onclick="addToSession('${e}')">${e}</span><span class="eplus" onclick="addToSession('${e}')">+</span><span class="edel" onclick="delExercise('${curMuscle}','${cat}','${e}')">×</span></div>`).join('')}</div>
    </div>`).join('')+`<div class="ex-section"><button class="add-small" style="font-size:13px;padding:4px 0" onclick="addCategory('${curMuscle}')">＋ 新增類別</button></div>`;
}
function addToSession(n){if(!session[n])session[n]=[{w:20,r:10}];renderRecCards()}
function renderRecCards(){
  const keys=Object.keys(session);
  document.getElementById('ex-empty').style.display=keys.length?'none':'block';
  document.getElementById('rec-cards').innerHTML=keys.map(name=>{
    const sets=session[name];
    return`<div class="excard">
      <div class="excard-head"><span class="excard-name">${name}</span><button class="del-btn" onclick="delFromSession('${name}')">🗑</button></div>
      <div class="set-cols"><span></span><div class="set-col-lbl">重量(kg)</div><div class="set-col-lbl">次數</div><span></span></div>
      ${sets.map((s,i)=>`<div class="set-row">
        <span class="snum">${i+1}</span>
        <div class="nctrl"><button class="nbtn" onclick="adj('${name}',${i},'w',-2.5)">−</button><span class="nval">${s.w}</span><button class="nbtn" onclick="adj('${name}',${i},'w',2.5)">＋</button></div>
        <div class="nctrl"><button class="nbtn" onclick="adj('${name}',${i},'r',-1)">−</button><span class="nval">${s.r}</span><button class="nbtn" onclick="adj('${name}',${i},'r',1)">＋</button></div>
        <button class="tbtn" onclick="startTimer()">⏱</button>
      </div>`).join('')}
      <div class="set-actions"><button class="sa-btn" onclick="rmSet('${name}')">− 減少組數</button><button class="sa-btn" onclick="addSet('${name}')">＋ 新增組數</button></div>
    </div>`;
  }).join('');
}
function delFromSession(n){delete session[n];renderRecCards()}
function addSet(n){const s=session[n];s.push({...s[s.length-1]});renderRecCards()}
function rmSet(n){if(session[n].length>1)session[n].pop();renderRecCards()}
function adj(n,i,k,d){session[n][i][k]=Math.max(k==='w'?0:1,Math.round((session[n][i][k]+d)*10)/10);renderRecCards()}
function finishWorkout(){
  const keys=Object.keys(session);
  if(!keys.length){alert('還沒有記錄任何動作！');return}
  const logs=loadLogs(),idx=logs.findIndex(l=>l.date===workoutDate);
  const entry={date:workoutDate,exercises:keys.map(n=>({name:n,sets:session[n].map(s=>({...s}))}))};
  if(idx>=0)logs[idx]=entry;else logs.push(entry);
  saveLogs(logs);go('s-home');
}

function addMuscle(){showModal('新增肌群',`<input class="modal-input" id="m-inp" placeholder="例：核心"><div class="modal-btns"><button class="m-cancel" onclick="closeModal()">取消</button><button class="m-ok" onclick="confirmAddMuscle()">新增</button></div>`)}
function confirmAddMuscle(){const v=document.getElementById('m-inp').value.trim();if(!v)return;const db=loadDB();if(!db[v])db[v]={'自由重量':[],'器械':[]};saveDB(db);closeModal();selMuscle(v)}
function editMuscle(m){
  const db=loadDB(),cats=db[m]||{};
  showModal(`編輯「${m}」`,`<div class="modal-list">${Object.keys(cats).map(c=>`<div class="modal-item"><span class="modal-item-name">${c}</span><button class="modal-item-del" onclick="delCategory('${m}','${c}')">刪除</button></div>`).join('')}</div><div class="modal-btns"><button class="m-cancel" onclick="closeModal()">關閉</button></div>`);
}
function delCategory(m,c){const db=loadDB();if(db[m]&&db[m][c]){delete db[m][c];saveDB(db)}closeModal();renderExLists()}
function addCategory(m){showModal(`新增類別到「${m}」`,`<input class="modal-input" id="c-inp" placeholder="例：複合動作"><div class="modal-btns"><button class="m-cancel" onclick="closeModal()">取消</button><button class="m-ok" onclick="confirmAddCat('${m}')">新增</button></div>`)}
function confirmAddCat(m){const v=document.getElementById('c-inp').value.trim();if(!v)return;const db=loadDB();if(!db[m][v])db[m][v]=[];saveDB(db);closeModal();renderExLists()}
function addExercise(m,c){showModal(`新增動作到「${c}」`,`<input class="modal-input" id="e-inp" placeholder="動作名稱"><div class="modal-btns"><button class="m-cancel" onclick="closeModal()">取消</button><button class="m-ok" onclick="confirmAddEx('${m}','${c}')">新增</button></div>`)}
function confirmAddEx(m,c){const v=document.getElementById('e-inp').value.trim();if(!v)return;const db=loadDB();if(!db[m][c].includes(v))db[m][c].push(v);saveDB(db);closeModal();renderExLists()}
function delExercise(m,c,e){const db=loadDB();db[m][c]=db[m][c].filter(x=>x!==e);saveDB(db);renderExLists()}

function startTimer(){tSec=tMax;tRunning=true;clearInterval(tInt);tInt=setInterval(tickT,1000);document.getElementById('t-pause').textContent='⏸ 暫停';updateT();go('s-timer')}
function tickT(){if(!tRunning)return;tSec--;if(tSec<=0){tSec=0;clearInterval(tInt);tRunning=false}updateT()}
function updateT(){const m=Math.floor(tSec/60),s=tSec%60;document.getElementById('t-disp').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;document.getElementById('t-bar').style.width=(tSec/tMax*100)+'%'}
function toggleT(){tRunning=!tRunning;document.getElementById('t-pause').textContent=tRunning?'⏸ 暫停':'▶ 繼續';if(tRunning)tInt=setInterval(tickT,1000);else clearInterval(tInt)}
function resetT(){clearInterval(tInt);tSec=tMax;tRunning=true;tInt=setInterval(tickT,1000);document.getElementById('t-pause').textContent='⏸ 暫停';updateT()}
function adjT(d){tMax=Math.max(10,tMax+d);tSec=Math.max(0,tSec+d);updateT()}

function renderPR(){
  const logs=loadLogs(),db=loadDB(),exMap={};
  logs.forEach(w=>{(w.exercises||[]).forEach(e=>{
    if(!exMap[e.name])exMap[e.name]={history:[],type:'器械'};
    exMap[e.name].history.push({date:w.date,w:Math.max(...e.sets.map(s=>s.w))});
    Object.entries(db).forEach(([,cats])=>{if(cats['自由重量']&&cats['自由重量'].includes(e.name))exMap[e.name].type='自由重量'});
  })});
  document.getElementById('pr-filters').innerHTML=['全部','自由重量','器械'].map(t=>`<div class="fchip ${t===prFilter?'on':''}" onclick="setPRFilter('${t}')">${t}</div>`).join('');
  const filtered=Object.entries(exMap).filter(([,v])=>prFilter==='全部'||v.type===prFilter);
  if(!filtered.length){document.getElementById('pr-cards').innerHTML='<div class="empty-hint">完成訓練後顯示</div>';return}
  document.getElementById('pr-cards').innerHTML=filtered.map(([name,v])=>{
    const best=Math.max(...v.history.map(h=>h.w)),last=v.history[v.history.length-1];
    const prev=v.history.length>1?v.history[v.history.length-2].w:null;
    const trend=prev?(last.w>prev?`↑ +${Math.round((last.w-prev)*10)/10}kg`:last.w<prev?`↓ ${Math.round((last.w-prev)*10)/10}kg`:'持平'):'';
    return`<div class="prcard ${selectedEx===name?'selected':''}" onclick="showPRChart('${name}')">
      <div class="prcard-left"><div class="prname">${name}</div><div class="prdate">${last.date}</div>${trend?`<div class="prtrend">${trend}</div>`:''}</div>
      <div class="prcard-right"><div class="prval">${best}</div><div class="prlabel">kg PR</div></div>
    </div>`;
  }).join('');
  if(selectedEx&&exMap[selectedEx])showPRChart(selectedEx,exMap);
  else document.getElementById('pr-chart-card').style.display='none';
}
function setPRFilter(f){prFilter=f;selectedEx=null;renderPR()}
function showPRChart(name,exMap){
  if(!exMap){const logs=loadLogs();exMap={};logs.forEach(w=>{(w.exercises||[]).forEach(e=>{if(!exMap[e.name])exMap[e.name]={history:[]};exMap[e.name].history.push({date:w.date,w:Math.max(...e.sets.map(s=>s.w))})})})}
  selectedEx=name;
  const data=exMap[name]||{history:[]};
  const card=document.getElementById('pr-chart-card');
  card.style.display='block';
  document.getElementById('pr-chart-title').textContent=name+' 重量趨勢';
  const ctx=document.getElementById('prChart').getContext('2d');
  if(prChartInst)prChartInst.destroy();
  prChartInst=new Chart(ctx,{type:'line',data:{labels:data.history.map(h=>h.date),datasets:[{data:data.history.map(h=>h.w),borderColor:'#E05A3A',backgroundColor:'rgba(224,90,58,0.1)',tension:0.4,pointBackgroundColor:'#E05A3A',pointRadius:5,fill:true}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
  card.scrollIntoView({behavior:'smooth'});
  renderPR();
}

function renderSettings(){
  const logs=loadLogs(),db=loadDB();
  const totalEx=Object.values(db).reduce((a,cats)=>a+Object.values(cats).reduce((b,exs)=>b+exs.length,0),0);
  document.getElementById('stats-logs').textContent=`共 ${logs.length} 筆訓練紀錄`;
  document.getElementById('stats-db').textContent=`${Object.keys(db).length} 個肌群，${totalEx} 個動作`;
  const lb=localStorage.getItem('wt_last_backup');
  document.getElementById('stats-backup').textContent=lb||'從未備份';
}
function exportData(){
  const payload={version:1,exported:new Date().toLocaleString('zh-TW'),logs:loadLogs(),db:loadDB()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const n=new Date();
  a.href=url;a.download=`workout_backup_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
  const ts=new Date().toLocaleString('zh-TW');
  localStorage.setItem('wt_last_backup',ts);
  showStatus('✅ 備份成功！檔案已下載');renderSettings();
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.logs||!data.db){alert('檔案格式不正確');return}
      if(!confirm(`確定要匯入備份嗎？\n這會覆蓋目前所有資料。\n備份日期：${data.exported||'未知'}`))return;
      saveLogs(data.logs);saveDB(data.db);
      showStatus('✅ 匯入成功！資料已還原');renderSettings();
    }catch(err){alert('讀取檔案失敗')}
  };
  reader.readAsText(file);event.target.value='';
}
function clearAllData(){
  if(!confirm('確定要清除所有訓練紀錄嗎？\n這個動作無法復原！'))return;
  localStorage.removeItem('wt_logs');localStorage.removeItem('wt_last_backup');
  showStatus('🗑 已清除所有訓練紀錄');renderSettings();
}
function showStatus(msg){const el=document.getElementById('backup-status');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',3000)}

function showModal(title,body){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal').style.display='flex'}
function closeModal(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').style.display='none'}

renderCal();
</script>
</body>
